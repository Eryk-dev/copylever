  - id: ERR-031
    date: "2026-03-05"
    category: item_copy
    title: "variations incompatible with family_name on brand/user_product destination"
    symptom: |
      Copy presentesunique → presentes-criativos-uniquebox fails for items with variations.
      ML rejects: "The field variations is invalid with family name" + "required [family_name, available_quantity]".
      Retry adds family_name but doesn't remove variations → loop.
    ml_error_code: body.invalid_fields + body.required_fields
    root_cause: |
      Source item is regular (has variations, no family_name). Destination requires family_name
      (brand/user_product account). Payload built with variations (is_user_product=False).
      Retry adds family_name but variations stays → ML says they're incompatible.
      _extract_ml_error_fields can't extract "variations" from error because ML doesn't use
      [brackets] in this message: "The field variations is invalid with family name".
    fix: |
      - Added _is_variations_invalid_with_family_name_error() detector
      - In _adjust_payload_for_ml_error: when detected, remove variations and ensure available_quantity
    file: app/services/item_copier.py
    lesson: |
      When destination requires family_name but source has variations, the item must be treated
      as User Product for the destination: remove variations, set available_quantity, use family_name.
      ML error messages without [brackets] need specific pattern detectors.

  - id: ERR-032
    date: "2026-03-05"
    category: item_copy
    title: "family_name exceeds 60 char limit — retry removes instead of truncating"
    symptom: |
      Copy MLB4456787126 fails: "Family Name length is over of 60 character".
      _is_family_name_invalid_error() triggers (detects "family name" + "invalid" in "length_invalid"),
      sets force_no_family_name=True. Next retry removes family_name, ML requires it back → loop.
    ml_error_code: item.family_name.length_invalid
    root_cause: |
      MAX_FAMILY_NAME_LEN was 120 but ML enforces 60 chars for some categories/accounts.
      The generic _is_family_name_invalid_error matched the length error code and set
      force_no_family_name, which removes family_name entirely instead of truncating.
    fix: |
      - Added _is_family_name_length_error() detector
      - In _adjust_payload_for_ml_error: truncate family_name to 60 chars
      - In retry loop: don't set force_no_family_name for length errors
    file: app/services/item_copier.py
    lesson: |
      ML family_name limit varies — can be 60 chars for some accounts/categories.
      Length errors should trigger truncation, not removal. Differentiate between
      "field is invalid" (wrong field type) and "field is too long" (truncatable).

  - id: ERR-033
    date: "2026-03-05"
    category: attributes
    title: "GIFTABLE, IS_HIGHLIGHT_BRAND, IS_TOM_BRAND not in excluded list"
    symptom: |
      Copy MLB5082877654: ML returns warnings for GIFTABLE, IS_HIGHLIGHT_BRAND, IS_TOM_BRAND
      ("ignored because it is not modifiable"). These are non-blocking but pollute debug logs.
    ml_error_code: item.attributes.ignored
    root_cause: "These read-only attributes were not in EXCLUDED_ATTRIBUTES set"
    fix: "Added GIFTABLE, IS_HIGHLIGHT_BRAND, IS_TOM_BRAND to EXCLUDED_ATTRIBUTES"
    file: app/services/item_copier.py
    lesson: "When ML says an attribute is 'not modifiable', add it to EXCLUDED_ATTRIBUTES immediately"

  - id: ERR-034
    date: "2026-03-05"
    category: item_copy
    title: "Missing MODEL attribute for category MLB270519"
    symptom: |
      Copy MLB5082877654 fails: "The attributes [MODEL] are required for category MLB270519".
      The only type="error" cause — all others (GIFTABLE, shipping warnings) are type="warning".
    ml_error_code: item.attributes.missing_required
    root_cause: |
      Source item (presentesunique) does not have MODEL attribute. MODEL is required for
      category MLB270519 but not present in the source item data.
      MODEL is not in EXCLUDED_ATTRIBUTES so it would be copied if present.
    fix: "No auto-fix possible — source item genuinely lacks the required attribute. Error message is clear."
    file: app/services/item_copier.py
    lesson: |
      Some categories require specific attributes (MODEL, etc.) that may not exist in the source.
      These are data issues, not code bugs. The error message is already descriptive.

  - id: ERR-035
    date: "2026-03-06"
    category: item_copy
    title: "Dimension errors waste 2 retry attempts before detection"
    symptom: |
      When item has no shipping dimensions, the retry loop tries normal + safe_mode
      before re-raising. The outer handler catches _is_dimension_error but debug logs
      are never marked resolved, polluting the unresolved logs.
    ml_error_code: item.attribute.missing.seller.package.dimensions
    root_cause: |
      _is_dimension_error detection only existed in the outer except block (after retry loop).
      The retry loop had no early exit for dimension errors, so it wasted 2 attempts
      (normal + safe_mode) on an unfixable error. Debug logs were never marked resolved.
    fix: |
      - Added early _is_dimension_error check inside the retry loop (before adjustments)
      - On detection: log to api_debug_logs with resolved=True and raise immediately
      - Skips useless safe_mode retry for dimension errors
    file: app/services/item_copier.py
    lesson: |
      Errors that are fundamentally unfixable by payload changes (missing dimensions,
      missing required source attributes) should bail out of the retry loop immediately.
      Don't waste retry attempts on errors that need user intervention.

  - id: ERR-036
    date: "2026-03-06"
    category: attributes
    title: "Missing MODEL attribute auto-fill from title"
    symptom: |
      Copy to presentes-criativos-uniquebox fails for multiple categories:
      "The attributes [MODEL] are required for category MLBxxxxxx".
      Source items genuinely lack MODEL attribute.
    ml_error_code: item.attributes.missing_required
    root_cause: |
      Source items don't have MODEL attribute. Destination categories require it.
      The _extract_ml_error_fields function didn't detect this error type because
      the ML code is "missing_required" not "required_fields", so the marker-based
      detection failed. No auto-fix was attempted.
    fix: |
      - Added _extract_missing_required_attributes() to detect "missing_required"
        and "missing_catalog_required" error codes and extract attribute IDs
      - In _adjust_payload_for_ml_error: auto-fill missing attributes from source
        item data, with MODEL fallback to title/family_name (truncated to 60 chars)
    file: app/services/item_copier.py
    lesson: |
      Required attributes that are missing from source can often be derived from
      other item fields. MODEL = title/family_name is a safe default for most
      categories. The _extract_ml_error_fields marker system doesn't cover all
      ML error codes — dedicated handlers are needed for specific patterns.

  - id: ERR-037
    date: "2026-03-06"
    category: item_copy
    title: "Field parser mixes required_fields with invalid_fields"
    symptom: |
      Copy retries for the same ML response alternate between contradictory fixes:
      family_name is treated as both required and invalid, so the next payload can
      remove or skip fields that should have been added.
    ml_error_code: body.required_fields
    root_cause: |
      _extract_ml_error_fields() collected every bracketed field from the exception
      payload once any marker matched somewhere in the response. A mixed cause array
      (for example required_fields + invalid_fields in the same error) contaminated
      the retry decisions with unrelated field names.
    fix: |
      - Added _text_matches_error_marker() to validate each text against the requested marker
      - _extract_ml_error_fields() now extracts bracketed fields only from texts that
        actually match the current marker
    file: app/services/item_copier.py
    lesson: |
      ML often returns multiple validation causes in a single 400 response. Field
      extraction must stay scoped to the specific error family being handled, or the
      retry system will make mutually exclusive adjustments.

  - id: ERR-038
    date: "2026-03-06"
    category: attributes
    title: "Conditional GTIN requirement hidden in variation attributes"
    symptom: |
      Copy of items like MLB3334511543 fails with:
      "item.attribute.missing_conditional_required [GTIN]".
      The source listing already has GTIN, but only at variation level.
    ml_error_code: item.attribute.missing_conditional_required
    root_cause: |
      get_item() fetched the source item without include_attributes=all, so some
      variation-level attributes (including GTIN) were omitted from the response.
      The payload builder also excluded GTIN, preventing retries from recovering it.
    fix: |
      - get_item() now requests include_attributes=all
      - GTIN was removed from EXCLUDED_ATTRIBUTES
      - Retry logic now looks for the missing attribute in both top-level and variation
        attributes before escalating to manual correction
    file: app/services/ml_api.py, app/services/item_copier.py
    lesson: |
      Conditional required attributes can live only in variations. When ML demands
      GTIN, inspect both top-level and variation attributes from the full source item
      before assuming the seller must fill it manually.

  - id: ERR-039
    date: "2026-03-06"
    category: item_copy
    title: "family_name invalid detector matches variations errors by mistake"
    symptom: |
      Logs show "added required family_name" in the retry actions, but the next
      request payload is sent without family_name and ML keeps returning
      body.required_fields [family_name].
    ml_error_code: body.invalid_fields
    root_cause: |
      _is_family_name_invalid_error() only checked whether the text contained both
      "family name" and "invalid". That also matched the message
      "The field variations is invalid with family name", which incorrectly enabled
      force_no_family_name and removed family_name again at the start of the next retry.
    fix: |
      - Narrowed _is_family_name_invalid_error() to actual family_name-invalid messages/codes
      - Kept "variations is invalid with family name" handled only by the dedicated
        _is_variations_invalid_with_family_name_error() detector
    file: app/services/item_copier.py
    lesson: |
      Error detectors must identify the invalid field itself, not any contextual
      mention that happens to contain the same words.

  - id: ERR-042
    date: "2026-03-07"
    category: attributes
    title: "Auto-fill EMPTY_GTIN_REASON when GTIN is conditional_required but missing from source"
    symptom: |
      When source item has no GTIN and dest category requires it (conditional_required),
      the system showed a manual correction form asking the user to provide GTIN.
      Users never know the GTIN — if the source seller didn't provide it, the copy
      seller won't either.
    ml_error_code: item.attribute.missing_conditional_required
    root_cause: |
      The auto-retry only tried to find GTIN in source item data. When not found,
      it fell through to manual correction. ML allows EMPTY_GTIN_REASON attribute
      as an alternative when GTIN is conditional_required (not hard required).
    fix: |
      - Added _is_conditional_required_error() to detect if a specific attribute error
        is conditional_required (vs hard required)
      - In _adjust_payload_for_ml_error: when GTIN is missing from source and error is
        conditional_required, auto-add EMPTY_GTIN_REASON with value_id=17055160
        ("No registrado") instead of asking user
      - If ML still rejects (e.g. GTIN is hard required for some categories), the
        correction form still works as fallback
    file: app/services/item_copier.py
    lesson: |
      ML's EMPTY_GTIN_REASON attribute (values: Artesanal/Kit/No registrado/Otro)
      is the official way to skip GTIN when it's conditional_required. Always prefer
      this over asking users for data they don't have.

  - id: ERR-041
    date: "2026-03-07"
    category: title
    title: "Title length exceeds category limit on copy"
    symptom: |
      Copying item MLB3185636875 (net-air → autofy) failed with
      item.title.length.invalid: "Category MLB190953 does not support titles
      greater than 60 characters long". Title had ~100 chars.
    ml_error_code: item.title.length.invalid
    root_cause: |
      Source item was created before the category enforced a 60-char title limit
      (or was recategorized). ML does not retroactively enforce title length on
      existing items, but validates on create. _build_item_payload copies the
      title as-is with no length check, and there was no auto-retry handler for
      this error — only for family_name length.
    fix: |
      - Added _is_title_length_error() detector (matches code containing "title" + "length")
      - Added _extract_title_max_length() to parse limit from error message (default 60)
      - In _adjust_payload_for_ml_error: truncate title to category limit instead of removing
      - In retry loop: skip force_no_title when error is title length (not type mismatch)
    file: app/services/item_copier.py
    lesson: |
      ML allows legacy items with titles exceeding current category limits.
      Auto-truncation was the initial fix. Superseded by ERR-054: now uses
      needs_correction flow so user can manually edit the title.

  - id: ERR-040
    date: "2026-03-06"
    category: attributes
    title: "Required-attribute parser captures category ids and misses direct constraints"
    symptom: |
      Manual correction metadata for GTIN could become "GTIN, MLB1586", and
      blocking messages like "WITH_USB is a required attribute" stayed as raw errors
      instead of opening a correction form.
    ml_error_code: field.constraint.violated
    root_cause: |
      The parser extracted every bracketed token from the message, so category ids
      like [MLB1586] were treated as attributes. It also had no path for ML errors
      that declare the required attribute directly in plain text.
    fix: |
      - Added dedicated regex extraction for "attributes [X] are required"
      - Ignore category tokens like MLB1586 when normalizing attribute ids
      - Parse direct messages such as "WITH_USB is a required attribute"
      - Manual-correction final logs now mark their debug attempts as resolved
    file: app/services/item_copier.py
    lesson: |
      Required-attribute parsing must be semantic, not just "anything inside []".
      ML mixes category ids, attribute ids, warnings and plain-text constraints in the
      same response family.

  - id: ERR-043
    date: "2026-03-13"
    category: pictures
    title: "item.pictures.max — Source item has more pictures than category limit"
    symptom: |
      Multiple items failing with item.pictures.max for seller 141air.
      Categories MLB193937, MLB190940, MLB194775, MLB191728 all enforce 12 pictures max.
      Auto-retry loop could not fix because no handler existed for this error code.
    ml_error_code: item.pictures.max
    root_cause: |
      _build_item_payload copied ALL pictures from source without any cap.
      _adjust_payload_for_ml_error had no handler for item.pictures.max.
    fix: |
      - Cap pictures to 12 in _build_item_payload (proactive, covers most categories)
      - Added _extract_pictures_max() helper to parse exact max from error message
      - Added handler in _adjust_payload_for_ml_error to truncate pictures on retry
    file: app/services/item_copier.py
    lesson: |
      Most ML categories cap pictures at 12. Always cap proactively and handle
      the error in retry for edge cases with different limits.

  - id: ERR-044
    date: "2026-03-13"
    category: attributes
    title: "invalid.item.attribute.values — Attribute with null value_id rejected"
    symptom: |
      Item MLB2683877883 failing with invalid.item.attribute.values for
      VEHICLE_PARTS_POSITION with value (null:Esquerdo). Retry loop could not fix.
    ml_error_code: invalid.item.attribute.values
    root_cause: |
      Source item has VEHICLE_PARTS_POSITION with value_name "Esquerdo" but null value_id.
      _build_item_payload included it because it had a value_name.
      ML rejected it because value_id is required for this attribute type.
    fix: |
      - Added _extract_invalid_attribute_ids() helper to parse attribute ID from error
      - Added handler in _adjust_payload_for_ml_error to remove the offending attribute on retry
    file: app/services/item_copier.py
    lesson: |
      Some attributes require a valid value_id, not just value_name.
      When ML rejects with invalid.item.attribute.values, strip the attribute and retry.

  - id: ERR-045
    date: "2026-03-17"
    category: asyncio
    title: "Task exception was never retrieved in _resolve_item_seller"
    symptom: |
      Logs flooded with "Task exception was never retrieved" for 403 errors
      when _resolve_item_seller tries multiple sellers concurrently.
    ml_error_code: access_denied (HTTP 403)
    root_cause: |
      _resolve_item_seller creates asyncio tasks for all sellers. When one
      succeeds, remaining tasks are cancelled. But tasks that already finished
      with an exception before cancel() was called have their exception
      unretrieved, triggering Python's asyncio warning.
    fix: |
      - Check t.done() before cancelling
      - For already-finished tasks, call t.result() inside try/except to
        suppress the "exception was never retrieved" warning
    file: app/routers/copy.py
    lesson: |
      When using asyncio.create_task with as_completed, always consume
      exceptions from completed tasks before discarding them.

  - id: ERR-046
    date: "2026-03-17"
    category: performance
    title: "Bulk resolve-sellers fails with many items due to N×M authenticated requests"
    symptom: |
      When user pastes 15-20+ item IDs, resolve-sellers often fails to identify
      the source seller. With 11 active sellers, each item triggers 11 authenticated
      GET /items/{id}?include_attributes=all requests. 20 items = 220 concurrent requests,
      causing 403 floods, rate limiting, and timeouts.
    root_cause: |
      _resolve_items_sellers called _resolve_item_seller per item, which tried
      all sellers in parallel with authenticated requests. Only the owner seller
      returns 200; all others return 403. Massive waste of API calls.
    fix: |
      - Added get_items_public() in ml_api.py: uses public GET /items?ids=... (up to 20 per call)
      - Rewrote _resolve_items_sellers to: (1) build ml_user_id→slug lookup from DB,
        (2) fetch items via public multi-get (no auth), (3) match seller_id to connected sellers
      - 20 items now resolved in 1 API call instead of 220
    file: app/routers/copy.py, app/services/ml_api.py
    lesson: |
      ML's /items endpoint is public — no auth needed to read seller_id.
      Use GET /items?ids=id1,id2,...,id20 for bulk resolution (max 20 per call).
      Only use authenticated requests when you need owner-only data (include_attributes=all).

  - id: ERR-047
    date: "2026-03-18"
    category: bug
    title: "item.channels.invalid not detected by _adjust_payload_for_ml_error"
    symptom: |
      Copying MLB6478066466 from net-air to autofy/automy/netparts-sp fails with
      item.channels.invalid error. The retry loop doesn't remove channels on first
      attempt — only catches it on safe_mode fallback (attempt 3+), wasting retries.
    root_cause: |
      _extract_ml_error_fields uses text-based matching for "invalid_fields" marker,
      but item.channels.invalid error code doesn't match any pattern: it doesn't
      contain "invalid_fields", "invalid field", or "field ... invalid". The channels
      field is never added to invalid_top, so removable_top_fields check never fires.
    fix: |
      Added cause-code pattern detection in _adjust_payload_for_ml_error: scan cause[]
      entries for codes matching item.{field}.invalid pattern (type=="error") and add
      the extracted field to invalid_top. This catches channels and any future fields
      using this ML error code pattern.
    file: app/services/item_copier.py
    ml_error_codes: [item.channels.invalid]
    lesson: |
      ML uses two different error patterns: (1) body.invalid_fields with field names
      in the message text, and (2) item.X.invalid with the field encoded in the error
      code itself. Must detect BOTH patterns.

  - id: ERR-048
    date: "2026-03-18"
    category: bug
    title: "ML 500 errors not retried with backoff"
    symptom: |
      After channels error triggers safe_mode retry, ML returns 500 (internal_error,
      internal_server). Since safe_mode was already used, the retry loop immediately
      raises without retrying the server error.
    root_cause: |
      Retry loop only handles validation errors (adjusting payload). ML 500 errors
      (Connection lease request time out, KVS errors) are transient infra issues
      that resolve after a few seconds, but the loop treats them the same as
      unresolvable validation errors.
    fix: |
      Added explicit 500 status code check at the top of the MlApiError handler.
      When status >= 500 and attempt < 4, logs the error, waits with exponential
      backoff (3s, 6s, 12s), and retries with the same payload.
    file: app/services/item_copier.py
    lesson: |
      ML API has frequent transient 500 errors. Always retry server errors with
      backoff before giving up. Don't conflate payload-fixable errors (400) with
      server-side issues (500).

  - id: ERR-049
    date: "2026-03-18"
    category: bug
    title: "Empty error messages in copy_logs and api_debug_logs"
    symptom: |
      Recent api_debug_logs entries have null error_message, response_body, and
      request_payload. copy_logs show error_details like {"autofy": "", "automy": ""}
      with empty error strings.
    root_cause: |
      Generic Exception handler uses str(e) which can be empty for some exception
      types (e.g. httpx network errors, Exception() without message). The
      _log_api_debug function checks `if error_message` which is False for empty
      string, storing null instead.
    fix: |
      Changed error_msg to use fallback: str(e) or f"{type(e).__name__}: {repr(e)}".
      This ensures error messages always contain at least the exception type and
      representation, even when str(e) is empty.
    file: app/services/item_copier.py
    lesson: |
      Never use bare str(e) for error logging — some exceptions have empty string
      representations. Always use a fallback like repr(e) or type(e).__name__.

  - id: ERR-050
    date: "2026-03-19"
    category: bug
    title: "httpx connection errors not retried in _ml_request"
    symptom: |
      Copies fail silently with empty error messages on the deployed Docker server.
      All api_debug_logs entries have null error_message, api_method, response_body.
      copy_logs show error_details like {"seller": ""}.
    root_cause: |
      _ml_request only handled 429 rate-limit retries but had no try/except for
      httpx transport exceptions (PoolTimeout, ConnectError, RemoteProtocolError,
      ReadError, WriteError). In long-running Docker containers, stale connections
      in the httpx pool cause these exceptions, which bubble up to the generic
      Exception handler with empty str() representation.
      Confirmed: httpx.PoolTimeout("") → str() == "" (empty, falsy).
    fix: |
      Added try/except in _ml_request for httpx transport exceptions. On connection
      error, retries up to 3 times with incremental backoff (2s, 4s, 6s). If all
      retries fail, raises RuntimeError with descriptive message including exception
      type, method, and URL.
    file: app/services/ml_api.py
    lesson: |
      Always wrap httpx client.request() in try/except for transport-level exceptions.
      These are distinct from HTTP-level errors (4xx/5xx) and need their own retry logic.
      Long-running containers are especially susceptible to stale connection pool issues.

  - id: ERR-051
    date: "2026-03-19"
    category: bug
    title: "retry-corrections 404 when org has >1000 copy_logs"
    symptom: |
      Clicking "Aplicar correção e copiar" on a correction group returns HTTP 404
      "Um ou mais logs nao foram encontrados" even though logs exist in the database.
      Happens when the org has accumulated more than 1000 copy_logs entries.
    root_cause: |
      retry_corrections endpoint fetched ALL copy_logs for the org with select("*")
      then filtered by IDs in Python. Supabase default limit is 1000 rows per query.
      Older log IDs (e.g., 1265-1270 with 1343 total logs) fell outside the 1000-row
      window and were not returned, causing the len() mismatch → 404.
    fix: |
      Added .in_("id", clean_log_ids) to the Supabase query so it fetches only the
      requested logs directly instead of all logs. This eliminates the 1000-row limit
      issue and is also more efficient.
    file: app/routers/copy.py
    lesson: |
      Never fetch all rows and filter in Python when Supabase has a default 1000-row
      limit. Always push filters into the query. This applies to any table that can
      grow beyond 1000 rows.

  - id: ERR-052
    date: "2026-03-23"
    category: infrastructure
    title: "httpx connection pool exhaustion — source seller not found after uptime"
    symptom: |
      After the VPS runs for some time, resolve-sellers and copy operations fail
      with "Item nao encontrado em nenhum seller conectado" or PoolTimeout errors.
      Restarting the VPS temporarily fixes the issue. All copy_logs show
      "ML API connection failed after 3 attempts (PoolTimeout)".
    root_cause: |
      The singleton httpx.AsyncClient had max_connections=20 and no keepalive_expiry.
      With 11 active sellers, _resolve_item_seller fires 11 parallel requests per item.
      Multiple concurrent resolves easily saturated the 20-connection pool.
      Additionally, cancelled asyncio tasks (from the as_completed+cancel pattern)
      could leak connections that were never returned to the pool.
      Without keepalive_expiry, stale/leaked connections occupied pool slots indefinitely.
      After enough operations, the pool was fully exhausted and all new requests timed out.
    fix: |
      1. Added keepalive_expiry=30 to both ML and Shopee httpx clients — stale idle
         connections are automatically discarded after 30 seconds.
      2. Increased pool to max_connections=30, max_keepalive_connections=15.
      3. Added _recycle_ml_client() — on PoolTimeout, the entire client is closed and
         recreated fresh, flushing all leaked/stale connections.
      4. Added is_closed check in _get_ml_client/_get_client to auto-recreate.
    files:
      - app/services/ml_api.py
      - app/services/shopee_api.py
    lesson: |
      Long-running singleton httpx clients MUST have keepalive_expiry set to prevent
      stale connection accumulation. When using asyncio.create_task + cancel patterns
      with httpx, connections can leak. Always have a recovery mechanism (client recycling)
      for PoolTimeout scenarios.

  - id: ERR-053
    date: "2026-03-23"
    category: ml_api_error
    title: "bad_request — user Product ID already has locations assigned"
    symptom: |
      POST /items returns 400 with message "user Product ID already has locations assigned"
      and empty cause array. Retries don't help because _adjust_payload_for_ml_error finds
      no fields to adjust (cause is empty). Affects sellers with multi-location inventory.
    root_cause: |
      ML's multi-location inventory system manages stock per-location, not per-item.
      When creating a new item that maps to a user product that already has locations
      configured, ML rejects the request because available_quantity conflicts with
      location-based stock management.
    fix: |
      1. Added _is_locations_assigned_error() detection function (message text match).
      2. ML matches user_products by family_name + PART_NUMBER (exact value match).
      3. On retry, normalize PART_NUMBER spacing: "X / Y / Z" → "X/Y/Z".
         This creates a new user_product (no location conflict) while preserving
         the part number data. Tested and confirmed via ML API.
      4. available_quantity=0 does NOT fix it. Switching to title (regular item)
         does NOT fix it (category requires family_name). The PART_NUMBER
         normalization is the only approach that works.
    files:
      - app/services/item_copier.py
    lesson: |
      ML matches user_products by family_name + PART_NUMBER exact value. Multi-location
      sellers reject duplicate user_product creation when locations exist. Normalizing
      PART_NUMBER spacing creates a new user_product, bypassing the conflict.
      Neither available_quantity=0 nor switching to title works for this error.
      This error has an empty cause array, so it must be detected via message text.
      Any seller may or may not have multi-location inventory enabled.

  - id: ERR-054
    date: "2026-03-30"
    category: ml_api_error
    title: "item.title.length.invalid — title exceeds category limit"
    symptom: |
      POST /items returns 400 with cause code item.title.length.invalid:
      "Category MLB63420 does not support titles greater than 60 characters long."
      Previously auto-truncated, but user needs to review/edit the title manually.
    root_cause: |
      Some ML categories enforce a max title length (e.g., 60 chars for MLB63420).
      The source item's title may exceed this limit. Auto-truncation can produce
      meaningless titles (cutting words mid-way), so user should choose the new title.
    fix: |
      1. Removed auto-truncation from _adjust_payload_for_ml_error for title length errors.
      2. Added _build_title_correction_details() — returns correction with kind="title",
         original_title, max_length, and a text input field for the new title.
      3. Title length error now bails out immediately in copy_single_item (like dimensions).
      4. Added copy_with_title_override() — re-copies with user-provided title (no source update).
      5. _bg_retry_corrections handles kind="title" by calling copy_with_title_override.
      6. Frontend CorrectionForm shows text input with maxLength and character counter.
    files:
      - app/services/item_copier.py
      - app/routers/copy.py
      - frontend/src/lib/api.ts
      - frontend/src/lib/helpers.ts
      - frontend/src/components/CorrectionForm.tsx
    lesson: |
      Title length limits vary by category. Auto-truncation produces poor titles.
      Better to let the user craft a proper short title via the correction flow.
      The title_override parameter in copy_single_item does NOT modify the source item.

  - id: ERR-055
    date: "2026-03-30"
    category: ml_api_warning
    title: "mandatory_free_shipping and lost_me1_by_user shipping warnings"
    symptom: |
      POST /items response includes cause codes:
      - shipping.lost_me1_by_user: "User has not mode me1"
      - item.shipping.mandatory_free_shipping: "Mandatory free shipping added"
      These are type="warning" in the ML response, not blocking errors.
    root_cause: |
      ML includes informational warnings alongside blocking errors in the cause array.
      mandatory_free_shipping: ML auto-adds free_shipping for items above certain price thresholds.
      lost_me1_by_user: destination seller doesn't have Full (me1) enrollment — we already use me2.
    fix: |
      1. Added handling in _adjust_payload_for_ml_error for mandatory_free_shipping:
         sets free_shipping=true in the shipping block.
      2. Added handling for lost_me1: confirms mode="me2" (belt and suspenders).
      3. These adjustments prevent confusion when the warnings appear alongside real errors,
         ensuring the retry focuses on the actual blocking issue.
    files:
      - app/services/item_copier.py
    lesson: |
      ML cause array mixes errors and warnings. mandatory_free_shipping is informational
      (ML already applies it), but proactively setting free_shipping=true avoids edge cases.
      Always check cause[].type — only type="error" causes are blocking.

  - id: ERR-056
    date: "2026-03-31"
    category: pictures
    title: "item.pictures.invalid.missing_ids — variation picture_ids not in item pictures list"
    symptom: |
      PUT /items/MLB2821809151 to update source attributes returned 400:
      "item.pictures.invalid.missing_ids: There is a conflict matching item variation
      pictures with item pictures list. Variations pictures [...] are not present in
      item pictures list."
      The PUT only sent {"attributes": [...]}, but ML validates the entire item state.
    ml_error_code: item.pictures.invalid.missing_ids
    root_cause: |
      The source item on ML has variations whose picture_ids reference pictures that
      are not in the item-level pictures array. This can happen when pictures are
      removed from the item (via ML portal or API) without updating variation
      picture_ids. ML validates picture consistency on every PUT, even if the PUT
      payload only changes attributes.
    fix: |
      1. Added _is_picture_missing_ids_error() to detect this error code.
      2. Added _build_pictures_sync_payload() to collect all variation picture_ids
         and merge missing ones into the item-level pictures list as {"id": missing_id}.
      3. Modified _copy_with_source_attribute_updates: when the initial PUT fails
         with this error, fetch the item, build synced pictures, retry with
         {"attributes": attrs, "pictures": synced_pictures}.
      4. Added handler in _adjust_payload_for_ml_error for the POST/create flow:
         if variations have picture_ids not in the payload's pictures list, add them.
    files:
      - app/services/item_copier.py
    lesson: |
      ML validates the ENTIRE item state on PUT, not just the fields you send.
      If the item has pre-existing inconsistencies (like orphaned variation
      picture_ids), even an attribute-only PUT will fail. The fix is to include
      the corrected pictures list in the PUT payload.

# ── Patterns & Rules ───────────────────────────────────────────────────────
# High-level lessons extracted from the error history above.
patterns:

  ml_api_item_types:
    description: "ML has two fundamentally different item types"
    regular_item:
      identification: "No user_product_listing tag, no family_name"
      title_field: title
      accepts_variations: true
      compat_endpoint: "POST /items/{id}/compatibilities"
    user_product:
      identification: "Has user_product_listing tag OR family_name"
      title_field: family_name (max 60 chars for some accounts, 120 for others — truncate to 60 to be safe)
      accepts_variations: false (on create — ML rejects "variations is invalid with family name")
      compat_endpoint: "POST /user-products/{up_id}/compatibilities"

  ml_api_brand_accounts:
    description: "Brand accounts (conta marca) have extra requirements"
    requirements:
      - "official_store_id must be in create payload"
      - "free_shipping must be true"
    official_store_id_resolution:
      - "NOT available via GET /users/me"
      - "Fetch from seller's active items: GET /users/{id}/items/search?status=active"
      - "Read from any item response: item.official_store_id"
      - "Cache in copy_sellers.official_store_id for future use"
    known_brand_sellers:
      - "141air (official_store_id: 84644)"

  ml_api_attribute_handling:
    description: "Rules for cleaning attributes before sending to ML"
    must_exclude:
      - "Attributes with null/empty id (source data quality issue)"
      - "ITEM_CONDITION — set via condition field"
      - "PACKAGE_* — auto-calculated by ML"
      - "SHIPMENT_PACKING — auto-calculated"
      - "CATALOG_TITLE, PRODUCT_FEATURES — catalog-managed"
      - "HAS_COMPATIBILITIES — read-only"
      - "GIFTABLE — read-only"
      - "IS_HIGHLIGHT_BRAND — read-only"
      - "IS_TOM_BRAND — read-only"
    value_extraction_order:
      - "Direct: value_id / value_name"
      - "Nested: values[0].id / values[0].name"
      - "Struct: value_struct.number + value_struct.unit"
    sku_extraction_order:
      - "item.seller_custom_field"
      - "item.attributes[SELLER_SKU]"
      - "variation.seller_custom_field"
      - "variation.attributes[SELLER_SKU]"
    sku_write_rules:
      - "Always set seller_custom_field at top level"
      - "For User Products: ALSO add SELLER_SKU attribute — ML interface reads from attribute, not field"
      - "For variations: set seller_custom_field per variation"
      - "ML interface displays SELLER_SKU attribute for User Products, seller_custom_field for regular items"
    conditional_required_rules:
      - "GTIN may be required even when it exists only in variation attributes"
      - "Fetch source items with include_attributes=all before concluding the attribute is missing"
      - "When ML asks for a required attribute, inspect both top-level and variation attributes before asking the seller to fill it manually"

  ml_api_shipping:
    description: "Shipping configuration rules"
    rules:
      - "Always use mode: me2 (Mercado Envios standard)"
      - "Never use me1 (Full) — it's seller-specific enrollment"
      - "Brand accounts need free_shipping: true"
      - "shipping.lost_me1_by_user is a WARNING, not an error — but _adjust confirms me2 mode"
      - "item.shipping.mandatory_free_shipping is a WARNING — _adjust sets free_shipping=true proactively"
      - "Mandatory free_shipping applies to certain categories and price thresholds"

  ml_api_rate_limits:
    description: "Rate limiting behavior and mitigation"
    behavior: "429 Too Many Requests with optional Retry-After header"
    mitigation:
      - "Exponential backoff: 3s base, doubles each retry, max 5 retries"
      - "1-second pacing between sequential API calls"
      - "Batch compat products in groups of 200"

  retry_loop_rules:
    description: "Rules for the auto-retry system"
    rules:
      - "Track what was tried (force_no_title, force_no_family_name, safe_mode_retry_used)"
      - "Extract bracketed fields only from texts that match the current marker (required_fields vs invalid_fields)"
      - "Never infer family_name invalid just because another field error mentions 'family name' in context"
      - "Never re-add a field that was explicitly removed due to error"
      - "When rebuilding payload (safe_mode), preserve dynamically discovered fields (official_store_id)"
      - "Log every attempt to api_debug_logs with full request/response"
      - "Mark debug logs as resolved when item is successfully created after retries"

  ml_api_error_parsing:
    description: "How to parse ML API error responses"
    response_structure: |
      {
        "error": "validation_error",
        "status": 400,
        "message": "Validation error",
        "cause": [
          {"code": "...", "type": "error"|"warning", "message": "...", "cause_id": N}
        ]
      }
    important: |
      The cause array mixes errors and warnings. Only items with type="error" are blocking.
      Warnings (type="warning") are informational and do NOT cause the failure.
      Always check cause[].type before treating an issue as the root cause.

  oauth_token_rules:
    description: "Rules for ML OAuth token handling"
    rules:
      - "Token exchange endpoint: api.mercadopago.com (NOT api.mercadolibre.com)"
      - "Use JSON body (NOT form-encoded)"
      - "refresh_token may be absent — use .get() and preserve existing on refresh"
      - "Reject auth if initial exchange has no refresh_token (fail fast)"
      - "Token auto-refresh on expiry via _get_token() in ml_api.py"

